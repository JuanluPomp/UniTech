<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="bg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg2)"/>

  <!-- Subtle circles pattern -->
  <circle cx="150" cy="600" r="200" fill="white" opacity="0.03"/>
  <circle cx="1050" cy="100" r="250" fill="white" opacity="0.03"/>

  <!-- Dashboard mockup card -->
  <g transform="translate(160, 80)">
    <!-- Main card -->
    <rect x="0" y="0" width="880" height="520" rx="16" fill="white" opacity="0.1"/>

    <!-- Top bar -->
    <rect x="0" y="0" width="880" height="50" rx="16" fill="white" opacity="0.08"/>
    <rect x="0" y="25" width="880" height="25" fill="white" opacity="0.08"/>
    <circle cx="30" cy="25" r="7" fill="white" opacity="0.2"/>
    <circle cx="55" cy="25" r="7" fill="white" opacity="0.15"/>
    <circle cx="80" cy="25" r="7" fill="white" opacity="0.1"/>
    <text x="440" y="31" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600" opacity="0.4">Panel de Reservas</text>

    <!-- Sidebar -->
    <rect x="0" y="50" width="180" height="470" fill="white" opacity="0.05"/>
    <rect x="20" y="75" width="140" height="12" rx="4" fill="white" opacity="0.15"/>
    <rect x="20" y="105" width="120" height="10" rx="4" fill="white" opacity="0.08"/>
    <rect x="20" y="130" width="130" height="10" rx="4" fill="white" opacity="0.08"/>
    <rect x="20" y="155" width="100" height="10" rx="4" fill="white" opacity="0.12"/>
    <rect x="20" y="180" width="140" height="10" rx="4" fill="white" opacity="0.08"/>
    <rect x="20" y="205" width="110" height="10" rx="4" fill="white" opacity="0.08"/>

    <!-- Content area - Stats row -->
    <g transform="translate(200, 70)">
      <!-- Stat card 1 - Reservas -->
      <rect x="0" y="0" width="200" height="90" rx="10" fill="white" opacity="0.08"/>
      <text x="20" y="30" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.4">Reservas Hoy</text>
      <text x="20" y="65" fill="white" font-family="system-ui, sans-serif" font-size="32" font-weight="700" opacity="0.5">24</text>
      <rect x="120" y="50" width="60" height="24" rx="12" fill="white" opacity="0.1"/>
      <text x="150" y="66" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" opacity="0.3">+12%</text>

      <!-- Stat card 2 - Ocupación -->
      <rect x="220" y="0" width="200" height="90" rx="10" fill="white" opacity="0.08"/>
      <text x="240" y="30" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.4">Ocupaci&#243;n</text>
      <text x="240" y="65" fill="white" font-family="system-ui, sans-serif" font-size="32" font-weight="700" opacity="0.5">87%</text>
      <rect x="340" y="50" width="60" height="24" rx="12" fill="white" opacity="0.1"/>
      <text x="370" y="66" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" opacity="0.3">+5%</text>

      <!-- Stat card 3 - Huéspedes -->
      <rect x="440" y="0" width="200" height="90" rx="10" fill="white" opacity="0.08"/>
      <text x="460" y="30" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.4">Hu&#233;spedes</text>
      <text x="460" y="65" fill="white" font-family="system-ui, sans-serif" font-size="32" font-weight="700" opacity="0.5">156</text>
      <rect x="560" y="50" width="60" height="24" rx="12" fill="white" opacity="0.1"/>
      <text x="590" y="66" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" opacity="0.3">+8%</text>
    </g>

    <!-- Calendar / Table area -->
    <g transform="translate(200, 190)">
      <rect x="0" y="0" width="660" height="310" rx="10" fill="white" opacity="0.06"/>

      <!-- Table header -->
      <rect x="0" y="0" width="660" height="36" rx="10" fill="white" opacity="0.06"/>
      <rect x="0" y="24" width="660" height="12" fill="white" opacity="0.06"/>
      <text x="20" y="24" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600" opacity="0.3">Habitaci&#243;n</text>
      <text x="160" y="24" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600" opacity="0.3">Hu&#233;sped</text>
      <text x="340" y="24" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600" opacity="0.3">Check-in</text>
      <text x="480" y="24" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600" opacity="0.3">Check-out</text>
      <text x="600" y="24" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600" opacity="0.3">Estado</text>

      <!-- Table rows -->
      <g transform="translate(0, 50)">
        <text x="20" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">Suite 101</text>
        <text x="160" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">J. Garc&#237;a</text>
        <text x="340" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">19 Mar</text>
        <text x="480" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">22 Mar</text>
        <rect x="595" y="-12" width="50" height="18" rx="9" fill="#34d399" opacity="0.3"/>
        <text x="620" y="1" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" opacity="0.5">Activa</text>
      </g>

      <line x1="15" y1="62" x2="645" y2="62" stroke="white" stroke-width="1" opacity="0.05"/>

      <g transform="translate(0, 88)">
        <text x="20" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">Hab. 205</text>
        <text x="160" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">M. L&#243;pez</text>
        <text x="340" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">20 Mar</text>
        <text x="480" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">25 Mar</text>
        <rect x="595" y="-12" width="50" height="18" rx="9" fill="#fbbf24" opacity="0.3"/>
        <text x="620" y="1" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" opacity="0.5">Pendiente</text>
      </g>

      <line x1="15" y1="100" x2="645" y2="100" stroke="white" stroke-width="1" opacity="0.05"/>

      <g transform="translate(0, 126)">
        <text x="20" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">Suite 302</text>
        <text x="160" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">R. Mart&#237;nez</text>
        <text x="340" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">18 Mar</text>
        <text x="480" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">21 Mar</text>
        <rect x="595" y="-12" width="50" height="18" rx="9" fill="#34d399" opacity="0.3"/>
        <text x="620" y="1" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" opacity="0.5">Activa</text>
      </g>

      <line x1="15" y1="138" x2="645" y2="138" stroke="white" stroke-width="1" opacity="0.05"/>

      <g transform="translate(0, 164)">
        <text x="20" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">Hab. 108</text>
        <text x="160" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">A. Hern&#225;ndez</text>
        <text x="340" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">21 Mar</text>
        <text x="480" y="0" fill="white" font-family="system-ui, sans-serif" font-size="12" opacity="0.25">24 Mar</text>
        <rect x="595" y="-12" width="50" height="18" rx="9" fill="#fbbf24" opacity="0.3"/>
        <text x="620" y="1" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="9" opacity="0.5">Pendiente</text>
      </g>
    </g>
  </g>

  <!-- Bottom text -->
  <text x="600" y="650" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="400" opacity="0.4">Panel de administraci&#243;n y reservas</text>
</svg>
