<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="700" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="700" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="700" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="700" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="700" stroke="white" stroke-width="1"/>
  </g>

  <!-- Hotel building icon -->
  <g transform="translate(440, 120)">
    <!-- Building body -->
    <rect x="60" y="80" width="200" height="260" rx="8" fill="white" opacity="0.15"/>
    <!-- Roof accent -->
    <rect x="60" y="80" width="200" height="12" rx="6" fill="white" opacity="0.3"/>
    <!-- Windows row 1 -->
    <rect x="90" y="115" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <rect x="143" y="115" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <rect x="195" y="115" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <!-- Windows row 2 -->
    <rect x="90" y="165" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <rect x="143" y="165" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <rect x="195" y="165" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <!-- Windows row 3 -->
    <rect x="90" y="215" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <rect x="143" y="215" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <rect x="195" y="215" width="35" height="30" rx="4" fill="white" opacity="0.25"/>
    <!-- Door -->
    <rect x="130" y="285" width="60" height="55" rx="6" fill="white" opacity="0.3"/>
    <circle cx="180" cy="312" r="4" fill="white" opacity="0.4"/>

    <!-- Calendar icon (left side) -->
    <g transform="translate(-30, 160)">
      <rect x="0" y="0" width="60" height="55" rx="8" fill="white" opacity="0.12"/>
      <rect x="0" y="0" width="60" height="16" rx="8" fill="white" opacity="0.2"/>
      <rect x="10" y="24" width="12" height="8" rx="2" fill="white" opacity="0.2"/>
      <rect x="28" y="24" width="12" height="8" rx="2" fill="white" opacity="0.2"/>
      <rect x="10" y="38" width="12" height="8" rx="2" fill="white" opacity="0.2"/>
      <rect x="28" y="38" width="12" height="8" rx="2" fill="white" opacity="0.3"/>
    </g>

    <!-- Key icon (right side) -->
    <g transform="translate(290, 170)">
      <circle cx="20" cy="20" r="16" stroke="white" stroke-width="3" fill="none" opacity="0.2"/>
      <line x1="36" y1="20" x2="65" y2="20" stroke="white" stroke-width="3" opacity="0.2"/>
      <line x1="55" y1="20" x2="55" y2="30" stroke="white" stroke-width="3" opacity="0.2"/>
      <line x1="65" y1="20" x2="65" y2="28" stroke="white" stroke-width="3" opacity="0.2"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="490" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" opacity="0.9">LogiHostel</text>

  <!-- Subtitle -->
  <text x="600" y="530" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" opacity="0.6">Agenda &middot; Reservas &middot; Gesti&#243;n Hotelera</text>

  <!-- Bottom decorative dots -->
  <g transform="translate(560, 570)" opacity="0.3">
    <circle cx="0" cy="0" r="4" fill="white"/>
    <circle cx="20" cy="0" r="4" fill="white"/>
    <circle cx="40" cy="0" r="4" fill="white"/>
    <circle cx="60" cy="0" r="4" fill="white" opacity="0.6"/>
    <circle cx="80" cy="0" r="4" fill="white" opacity="0.3"/>
  </g>
</svg>
